<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link href="./assets/CSS/output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <header class="header sticky top-0 z-9 bg-background">
        <div class="flex 
        px-[3.125rem] py-[1.25rem] 
        max-[500px]:px-[1.875rem] 
        justify-between items-center">
            <div class="logo shrink-0 w-[243.41px] max-[400px]:w-[180px]">
                <a href="#">
                    <img src="./assets/images/navbar imgs/logo.svg" />
                </a>
            </div>
            <nav class="block max-[982px]:hidden">
                <ul class="flex items-center gap-[1.875rem]">
                    <li class="nav-link hover-effect">
                        <a href="#">
                            Marketplace
                        </a>
                    </li>
                    <li class="nav-link hover-effect">
                        <a href="#">
                            Rankings
                        </a>
                    </li>
                    <li class="nav-link hover-effect">
                        <a href="#">
                            Connect a Wallet
                        </a>
                    </li>
                    <li>
                        <a href="./Create-Account.html" class="btn flex gap-[1.25rem] px-[1.25rem] py-[1.188rem] nav-link hover-effect">
                            <img src="./assets/images/navbar imgs/User.svg" />
                            Sign Up
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="hidden max-[982px]:block shrink-0">
                <img src="./assets/images/navbar imgs/Burger Menu.svg" />
            </div>
        </div>
    </header>
    <main>
        <section class="Brows py-[5rem] max-[982px]:py-[2.5rem]">
            <div class="max-w-[70%] max-[1200px]:max-w-[85%] mx-auto">
                <div>
                    <h1 class="text-[3.188rem] font-semibold leading-[110%] tracking-[0%]
                    max-[1165px]:text-[2.375rem]
                    max-[400px]:text-[1.75rem]">
                        Top Creators
                    </h1>
                    <p class="text-[1.375rem] font-normal leading-[160%] tracking-[0%] mt-[1.25rem]
                    max-[650px]:text-[1.1rem]">
                        Check out top ranking NFT artists on the NFT Marketplace.
                    </p>
                </div>
            </div>
        </section>
        <section class="tabs border-t border-secondaryBackground">
            <div class="max-w-[70%] max-[1200px]:max-w-[85%] mx-auto">
                <nav>
                <ul class="flex justify-between ">
                    <li class="border-b-2 border-lightFont
                     pt-[1.813rem] pb-[1.188rem] px-[4.234rem]
                     max-[1321px]:px-[2.5rem]
                     max-[715px]:px-[1.25rem]
                     max-[400px]:px-[1rem]">
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] max-[1120px]:text-[1rem] max-[620px]:hidden">
                            Today
                        </button>
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] max-[1120px]:text-[1rem] hidden max-[620px]:block">
                            1d
                        </button>
                    </li>
                    <li class="pt-[1.813rem] pb-[1.188rem] px-[4.234rem]
                    max-[1321px]:px-[2.5rem]
                    max-[715px]:px-[1.25rem]
                    max-[400px]:px-[1rem]">
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] text-lightFont max-[1120px]:text-[1rem] max-[620px]:hidden">
                            This Week
                        </button>
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] text-lightFont max-[1120px]:text-[1rem] hidden max-[620px]:block">
                            7d
                        </button>
                    </li>
                    <li class="pt-[1.813rem] pb-[1.188rem] px-[4.234rem]
                    max-[1321px]:px-[2.5rem]
                    max-[715px]:px-[1.25rem]
                    max-[400px]:px-[1rem]">
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] text-lightFont max-[1120px]:text-[1rem] max-[620px]:hidden">
                            This Month
                        </button>
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] text-lightFont max-[1120px]:text-[1rem] hidden max-[620px]:block">
                            30d
                        </button>
                    </li>
                    <li class="pt-[1.813rem] pb-[1.188rem] px-[4.234rem]
                    max-[1321px]:px-[2.5rem]
                    max-[715px]:px-[1.25rem]
                    max-[400px]:px-[1rem]">
                        <button class="flex text-[1.375rem] font-semibold leading-[140%] tracking-[0%]
                        gap-[1rem] text-lightFont max-[1120px]:text-[1rem]">
                            All Time
                        </button>
                    </li>
                </ul>
            </nav>
            </div>
        </section>
    </main>

</body>
</html>
